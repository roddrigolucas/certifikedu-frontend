name: Deploy Plataforma to VPS

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VPS_USERNAME }}/deploy/frontend || cd /home/${{ secrets.VPS_USERNAME }}/deploy/plataform
            git pull
            cd ..
            docker compose -f backend/docker-compose.vps.yml up -d --build frontend || docker compose -f certifikedu-backend/docker-compose.vps.yml up -d --build frontend
