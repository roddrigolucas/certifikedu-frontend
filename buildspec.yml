version: 0.2
phases:
  install:
    commands:
      - aws s3 sync cloudFrontAssets s3://plataform-react-image-serve
      - npm install
  build:
    commands:
      - npm run build
  post_build:
    commands:
      - aws s3 sync dist s3://certifikedu-react-app-hml --delete
artifacts:
  files:
    - "**/*"
  discard-paths: no
  base-directory: dist